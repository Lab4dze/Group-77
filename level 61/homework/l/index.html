<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Lexend+Deca:wght@100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Results summary component</title>

</head>
<body>
  <div class="main">
    <div class="left">
      <h2>Your Result</h2>
      <div class="round">
        <h1>76</h1>
        <p class="srs">of 100</p>
      </div>
      <p class="fa">Great</p>
      <p class="txts">You scored higher than 65% of the people who have taken these tests.</p>
    </div>
    <p class="sum">Summary</p>
    <div class="all">
      <div id="blocks" class="red">
      <img src="./assets/images/icon-reaction.svg" alt="" class="pcs">
      <h3>Reaction</h3>
      <p class="stats">80 <span>/ 100</span></p>
    </div>
    <div id="blocks" class="yellow">
      <img src="./assets/images/icon-memory.svg" alt="" class="pcs">
      <h3>Memory</h3>
      <p class="stats">92 <span>/ 100</span></p>
    </div>
    <div id="blocks" class="green">
      <img src="./assets/images/icon-verbal.svg" alt="" class="pcs">
      <h3>Verbal</h3>
      <p class="stats">61 <span>/ 100</span></p>
    </div>
    <div id="blocks" class="blue">
      <img src="./assets/images/icon-visual.svg" alt="" class="pcs">
      <h3>Visual</h3>
      <p class="stats">73 <span>/ 100</span></p>
    </div>
    <button>Continue</button>
    </div>

  </div>
</body>
</html>
<!-- You scored higher than 65% of the people who have taken these tests. -->
